name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validar codigo
        run: echo "Codigo validado"

  build:
    runs-on: ubuntu-latest
    needs: validar
    steps:
      - uses: actions/checkout@v3
      - name: Mostrar mensagem secreta
        run: echo "Mensagem secreta: ${{ secrets.MENSAGEM_SECRETA }}"
      - name: Simular build
        run: echo "Build executado com sucesso"