name: Pipeline CI - Fail Fast

on:
  push:
    branches:
      - main

jobs:
  validar-codigo:
    name: Validacao do Codigo
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Validar codigo
        run: |
          echo "Iniciando validacao do codigo..."
          echo "Codigo analisado com sucesso"

  simular-build:
    name: Simulacao de Build
    runs-on: ubuntu-latest
    needs: validar-codigo

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Mostrar mensagem secreta
        run: echo "Mensagem secreta: ${{ secrets.MENSAGEM_SECRETA }}"

      - name: Simular build
        run: |
          echo "Iniciando build do projeto..."
          echo "Build finalizado com sucesso"